services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Intel@12345"
    networks:
      sb-emulator:
        aliases:
          - sqledge
    restart: unless-stopped

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    depends_on:
      - sqledge
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Intel@12345"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: 5300
    volumes:
      - ./servicebus/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    networks:
      sb-emulator:
        aliases:
          - servicebus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5300/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  assethub.service:
    build:
      context: .
      dockerfile: AssetHub.Service/Dockerfile
    container_name: asset-sync-app
    depends_on:
      servicebus:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"

      ServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=Eby8vdM02xNOcqFeqCnf2g==;UseDevelopmentEmulator=true;"
      ServiceBus__TopicName: "fieldops-events"
      ServiceBus__SubscriptionName: "assethub-sync"

      AssetHub__BaseUrl: "http://localhost:9090"
      AssetHub__TokenUrl: "http://localhost:9090/oauth/token"
      AssetHub__ClientId: "mock-client"
      AssetHub__ClientSecret: "mock-secret"
    ports:
      - "5000:8080"
      - "9090:9090"
    networks:
      - sb-emulator
    restart: unless-stopped

networks:
  sb-emulator: